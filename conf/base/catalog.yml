# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

raw_json:
  type: kedro_datasets.partitions.PartitionedDataset
  path: data/01_raw/json
  dataset: kedro_datasets.json.JSONDataset

openface_csv:
  type: kedro_datasets.partitions.PartitionedDataset
  path: data/02_intermediate/openface
  dataset:
    type: pandas.CSVDataset
    load_args:
      low_memory: False

openface_extraction_log:
  type: json.JSONDataset
  filepath: data/02_intermediate/openface/run_log.json
  versioned: true

cleaned_dataframe:
  type: pandas.ParquetDataset
  filepath: data/03_primary/cleaned.parquet
  versioned: true


metadata_map:
  type: pandas.ParquetDataset
  filepath: data/03_primary/metadata.parquet
  versioned: true


feature_dataset:
  type: pandas.ParquetDataset
  filepath: data/04_feature/features.parquet
  versioned: true

  
feature_dataset_preview:
  type: pandas.CSVDataset
  filepath: data/08_reporting/features.csv
  save_args:
    index: False
    encoding: utf-8-sig
  versioned: true
  

model_input:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/model_input.parquet
  versioned: true


fatigue_model:
  type: pickle.PickleDataset
  filepath: data/06_models/fatigue_model.pkl
  versioned: true


prediction_output:
  type: kedro_datasets.json.JSONDataset
  filepath: data/07_model_output/predictions.json
  versioned: true


report_scores:
  type: kedro_datasets.json.JSONDataset
  filepath: data/07_model_output/report_scores.json
  versioned: true
